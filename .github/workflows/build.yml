name: Build IPA

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build .app
        run: |
          xcodebuild build \
            -project LocalType_iOS.xcodeproj \
            -scheme LocalType \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath Build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

      - name: Package .ipa
        run: |
          mkdir -p Payload
          cp -r Build/Build/Products/Release-iphoneos/LocalType.app Payload/
          zip -r LocalType.ipa Payload/
          rm -rf Payload

      - uses: actions/upload-artifact@v4
        with:
          name: LocalType
          path: LocalType.ipa

      - name: Upload to draft release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --draft \
            --generate-notes \
            --title "LocalType ${{ github.ref_name }}" \
            LocalType.ipa
