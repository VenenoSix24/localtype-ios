name: Build IPA

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.1)"
        required: false
        type: string

jobs:
  build:
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v4

      - name: Build .app
        run: |
          xcodebuild build \
            -project LocalType.xcodeproj \
            -scheme LocalType \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath Build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

      - name: Package .ipa
        run: |
          APP=$(find Build -name "LocalType.app" -type d | head -1)
          mkdir -p Payload
          cp -r "$APP" Payload/
          zip -r LocalType.ipa Payload/
          rm -rf Payload

      - uses: actions/upload-artifact@v4
        with:
          name: LocalType
          path: LocalType.ipa

      - name: Upload to draft release
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
            if [ -z "$VERSION" ]; then
              VERSION="0.0.0-$(date +%Y%m%d)-${GITHUB_SHA:0:7}"
            fi
            TAG="v$VERSION"
          fi
          gh release create "$TAG" --draft --generate-notes --title "LocalType $TAG" LocalType.ipa \
            || gh release upload "$TAG" LocalType.ipa --clobber
